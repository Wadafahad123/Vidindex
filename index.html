            animation: fastGradient 5s ease infinite;
            display: flex;

        .btn-red { 
            background: #ff0000; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8); 
        }

        .btn:hover { 
            transform: scale(1.05); 
            filter: brightness(1.2); 
        }

        /* Video Container Styling */
        .video-box {
            margin-top: 20px;
            border: 4px solid #00ff00;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px #00ff00;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .footer-text {

            font-size: 15px;
            margin-top: 20px;
