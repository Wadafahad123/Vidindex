            animation: fastGradient 5s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
        }

        @keyframes fastGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }

        }

        .container {
            padding: 30px;

            border-radius: 25px;
            box-shadow: 0 0 50px #ff0000, inset 0 0 20px #00ff00;

            max-width: 400px;
            position: relative;
        }

        /* Animated Sticker Styling */
        .sticker-top {
            width: 80px;
            margin-bottom: 10px;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 15px #ff0000, 0 0 25px #ff0000;
            font-size: 28px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            display: block;
            padding: 18px;
            margin: 15px 0;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 17px;
            border: 3px solid #fff;
            transition: 0.3s;
            color: white;
            text-shadow: 1px 1px 5px #000;
        }

        .btn-red { 
            background: #ff0000; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8); 
        }

        .btn:hover { 
            transform: scale(1.05); 
            filter: brightness(1.2); 
        }

        .footer-text {

            font-size: 16px;
            margin-top: 25px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 10px;
        }

        .fire-sticker {
            width: 30px;
            vertical-align: middle;
        }
    </style>
